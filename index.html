<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Graph Pretext</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
    #app { display: flex; height: 100vh; }
    #canvas-wrap { flex: 1; position: relative; }
    #canvas { width: 100%; height: 100%; display: block; cursor: grab; }
    #canvas.grabbing { cursor: grabbing; }
    #search-bar {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 340px; padding: 8px 14px; border-radius: 8px;
      background: #1e293bee; border: 1px solid #334155; color: #f1f5f9;
      font: 13px Inter, sans-serif; outline: none; backdrop-filter: blur(8px);
      transition: border-color 0.15s;
    }
    #search-bar::placeholder { color: #64748b; }
    #search-bar:focus { border-color: #38bdf8; }
    #search-bar.active { border-color: #38bdf8; background: #1e293b; }
    #filter-badge {
      position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
      padding: 4px 14px; border-radius: 12px; font: 600 11px Inter, sans-serif;
      cursor: pointer; display: none; backdrop-filter: blur(8px);
    }
    #filter-badge.visible { display: block; }
    #panel-canvas { width: 360px; min-width: 360px; display: block; cursor: default; border-left: 1px solid #334155; }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <input type="text" id="search-bar" placeholder="Search tools... (Enter to group)" autocomplete="off" />
      <div id="filter-badge">Showing: <span id="filter-label"></span> &times;</div>
    </div>
    <canvas id="panel-canvas"></canvas>
    <input type="file" id="file-input" accept=".json,.md,.zip" multiple style="display:none" />
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
